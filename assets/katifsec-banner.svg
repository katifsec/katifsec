    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientTransform="translate(220 70) rotate(33) scale(420 260)">
      <stop stop-color="#6F7CFF" stop-opacity=".35"/><stop offset="1" stop-color="#6F7CFF" stop-opacity="0"/>
